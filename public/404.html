<!doctype html>
<html>
  <head>
    <script>
      // SPA redirect for GitHub Pages
      var path = window.location.pathname;
      var repo = '/ultimate-tracker';
      if (path.startsWith(repo)) {
        var route = path.slice(repo.length) || '/';
        window.location.replace(repo + '/?route=' + encodeURIComponent(route));
      }
    </script>
  </head>
</html>
